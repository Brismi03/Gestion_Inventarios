{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card" style="margin: 30px;">

        <div class="card-header text-center border-3">
            <h1 class="h4 mb-0 fw-bold">
                {{titulo}}
            </h1>
        </div>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="fw-bold">
                        {{ form.producto.label }}
                    </label>

                    {{ form.producto }}

                    {% if form.producto.errors %}
                    <div class="text-danger small">
                        {{ form.producto.errors }}
                    </div>
                    {% endif %}
                    </div>
                    <div class="col-6">
                        <label class="fw-bold d-block">
                        {{ form.cantidad.label }}
                    </label>
                    {{ form.cantidad }}
                    <div class="text-danger">
                        {{ form.cantidad.errors }}
                    </div>

                    </div>
                    
                </div>
                <div class="mb-3">
                    <label class="fw-bold">
                        {{ form.nota.label }}
                    </label>
                    {{ form.nota }}
                    <div class="text-danger">
                        {{ form.nota.errors }}
                    </div>
                </div>


                <!-- Botones -->
                <div class="d-flex justify-content-end gap-2">
                    <button class="btn btn-primary">
                        Guardar
                    </button>

                    <a class="btn btn-secondary"
                        href="{% url 'listar_inventario' %}">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
